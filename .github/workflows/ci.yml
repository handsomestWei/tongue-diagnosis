name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: td_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install
        run: pip install -e ".[api,dev]"
      - name: Alembic (MySQL smoke)
        env:
          DATABASE_URL: mysql+pymysql://root:root@127.0.0.1:3306/td_test?charset=utf8mb4
        run: PYTHONPATH=. alembic upgrade head
      - name: Pytest (SQLite)
        run: PYTHONPATH=. pytest tests/ -q
